<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¿Qué vemos hoy?</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; padding: 2rem 1rem 4rem; }
    .hero { text-align: center; margin-bottom: 2.5rem; padding-top: 1rem; }
    .hero-eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; margin-bottom: 0.75rem; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 900; line-height: 1.05; margin-bottom: 0.5rem; }
    .hero-title span { color: #D85A30; }
    .hero-sub { font-size: 14px; color: #999; font-weight: 300; }
    .progress-bar { width: 100%; max-width: 560px; margin: 0 auto 2rem; height: 2px; background: #2a2a2a; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: #D85A30; border-radius: 999px; transition: width 0.4s ease; }
    .card { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 16px; padding: 1.75rem; max-width: 560px; margin: 0 auto 1.25rem; }
    .q-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #D85A30; margin-bottom: 0.5rem; font-weight: 500; }
    .q-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; line-height: 1.35; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 8px 16px; border-radius: 999px; border: 0.5px solid #333; background: #222; font-size: 13px; cursor: pointer; transition: all 0.15s ease; color: #aaa; font-family: 'DM Sans', sans-serif; user-select: none; }
    .chip:hover { border-color: #D85A30; color: #D85A30; }
    .chip.selected { background: #D85A30; border-color: #D85A30; color: #fff; }
    .text-input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 0.5px solid #333; background: #222; font-size: 14px; font-family: 'DM Sans', sans-serif; color: #f0f0f0; resize: none; outline: none; transition: border-color 0.15s; }
    .text-input:focus { border-color: #D85A30; }
    .nav { max-width: 560px; margin: 0 auto; display: flex; justify-content: flex-end; gap: 10px; }
    .btn { padding: 10px 24px; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s ease; border: 0.5px solid #333; background: transparent; color: #aaa; }
    .btn:hover { background: #222; }
    .btn-primary { background: #D85A30; border-color: #D85A30; color: #fff; }
    .btn-primary:hover { background: #993C1D; border-color: #993C1D; }
    .result-card { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 16px; padding: 1.5rem 1.75rem; max-width: 560px; margin: 0 auto 1rem; }
    .result-num { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #D85A30; font-weight: 500; margin-bottom: 0.4rem; }
    .result-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
    .result-meta { font-size: 12px; color: #666; margin-bottom: 0.6rem; }
    .result-desc { font-size: 13px; color: #aaa; line-height: 1.6; }
    .loading-box { text-align: center; padding: 3rem 1rem; max-width: 560px; margin: 0 auto; }
    .spinner { width: 36px; height: 36px; border: 2px solid #2a2a2a; border-top-color: #D85A30; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .restart-wrap { text-align: center; max-width: 560px; margin: 1.5rem auto 0; }
  </style>
</head>
<body>
  <div id="app">
    <div class="hero">
      <p class="hero-eyebrow">Recomendador personal</p>
      <h1 class="hero-title">¿Qué vemos <span>hoy?</span></h1>
      <p class="hero-sub">Respondé unas preguntas y la IA te recomienda qué mirar esta noche.</p>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="questions-container"></div>
    <div class="nav" id="nav-btns">
      <button class="btn" id="btn-back">Atrás</button>
      <button class="btn btn-primary" id="btn-next">Siguiente</button>
    </div>
  </div>

  <script>
    const TOTAL = 8;
    const questions = [
      { id: 'mood', label: 'Pregunta 1 de 8', text: '¿Cómo estás hoy?', type: 'single', options: ['Con energía', 'Melancólico', 'Cansado', 'Aburrido'] },
      { id: 'feeling', label: 'Pregunta 2 de 8', text: '¿Qué querés sentir?', type: 'multi', options: ['Reírme', 'Emocionarme', 'Acción', 'Terror', 'Pensar / reflexionar', 'Suspenso / intriga'] },
      { id: 'last_watched', label: 'Pregunta 3 de 8', text: '¿Lo último que viste?', type: 'text_then_single', placeholder: 'Ej: Breaking Bad, Oppenheimer...', subQuestion: '¿Te gustó?', subOptions: ['Sí, me encantó', 'Más o menos', 'No recuerdo', 'No'] },
      { id: 'company', label: 'Pregunta 4 de 8', text: '¿Solo o acompañado?', type: 'single', options: ['Solo', 'Con amigos', 'En pareja', 'En familia'] },
      { id: 'new_or_classic', label: 'Pregunta 5 de 8', text: '¿Algo nuevo o un clásico?', type: 'single', options: ['Nuevo', 'Clásico', 'Me da igual'] },
      { id: 'origin', label: 'Pregunta 6 de 8', text: '¿De dónde querés que sea?', type: 'single', options: ['Argentino / latino', 'Del exterior', 'Me da igual'] },
      { id: 'format', label: 'Pregunta 7 de 8', text: '¿Peli, serie o las dos?', type: 'multi', options: ['Película', 'Serie', 'Las dos'] },
      { id: 'platforms', label: 'Pregunta 8 de 8', text: '¿En qué plataformas tenés?', type: 'multi', options: ['Netflix', 'Disney+', 'Max / HBO', 'Prime Video', 'Paramount+', 'Apple TV+', 'Star+', 'Pluto TV', 'Tengo acceso a todo'] }
    ];

    let current = 0;
    let answers = {};

    function gc() { return document.getElementById('questions-container'); }
    function updateProgress() { document.getElementById('progress').style.width = ((current / TOTAL) * 100) + '%'; }

    function renderQuestion() {
      updateProgress();
      const q = questions[current];
      const container = gc();
      document.getElementById('btn-back').style.visibility = current === 0 ? 'hidden' : 'visible';
      document.getElementById('btn-next').textContent = current === TOTAL - 1 ? 'Ver recomendaciones' : 'Siguiente';
      document.getElementById('nav-btns').style.display = 'flex';

      if (q.type === 'text_then_single') {
        const textVal = answers[q.id + '_text'] || '';
        const subVal = answers[q.id + '_sub'] || '';
        container.innerHTML = `
          <div class="card">
            <p class="q-label">${q.label}</p>
            <p class="q-text">${q.text}</p>
            <textarea class="text-input" id="text-answer" rows="2" placeholder="${q.placeholder}">${textVal}</textarea>
            <p class="q-text" style="margin-top:1.25rem;font-size:1rem">${q.subQuestion}</p>
            <div class="chips">${q.subOptions.map(opt => `<div class="chip${subVal===opt?' selected':''}" data-sub="${opt}">${opt}</div>`).join('')}</div>
          </div>`;
        container.querySelectorAll('[data-sub]').forEach(el => {
          el.addEventListener('click', function() {
            answers[q.id + '_sub'] = this.dataset.sub;
            container.querySelectorAll('[data-sub]').forEach(c => c.classList.remove('selected'));
            this.classList.add('selected');
          });
        });
      } else if (q.type === 'single') {
        const val = answers[q.id] || '';
        container.innerHTML = `
          <div class="card">
            <p class="q-label">${q.label}</p>
            <p class="q-text">${q.text}</p>
            <div class="chips">${q.options.map(opt => `<div class="chip${val===opt?' selected':''}" data-val="${opt}">${opt}</div>`).join('')}</div>
          </div>`;
        container.querySelectorAll('[data-val]').forEach(el => {
          el.addEventListener('click', function() {
            answers[q.id] = this.dataset.val;
            container.querySelectorAll('[data-val]').forEach(c => c.classList.remove('selected'));
            this.classList.add('selected');
          });
        });
      } else {
        const vals = answers[q.id] || [];
        container.innerHTML = `
          <div class="card">
            <p class="q-label">${q.label}</p>
            <p class="q-text">${q.text}</p>
            <div class="chips">${q.options.map(opt => `<div class="chip${vals.includes(opt)?' selected':''}" data-val="${opt}">${opt}</div>`).join('')}</div>
          </div>`;
        container.querySelectorAll('[data-val]').forEach(el => {
          el.addEventListener('click', function() {
            if (!answers[q.id]) answers[q.id] = [];
            const idx = answers[q.id].indexOf(this.dataset.val);
            if (idx >= 0) { answers[q.id].splice(idx,1); this.classList.remove('selected'); }
            else { answers[q.id].push(this.dataset.val); this.classList.add('selected'); }
          });
        });
      }
    }

    document.getElementById('btn-next').addEventListener('click', function() {
      const q = questions[current];
      if (q.type === 'text_then_single') {
        const el = document.getElementById('text-answer');
        if (el) answers[q.id + '_text'] = el.value;
      }
      if (current < TOTAL - 1) { current++; renderQuestion(); }
      else { showLoading(); }
    });

    document.getElementById('btn-back').addEventListener('click', function() {
      if (current > 0) { current--; renderQuestion(); }
    });

    function showLoading() {
      document.getElementById('progress').style.width = '100%';
      document.getElementById('nav-btns').style.display = 'none';
      gc().innerHTML = `
        <div class="loading-box">
          <div class="spinner"></div>
          <p style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:0.5rem">Consultando a la IA...</p>
          <p style="font-size:13px;color:#999">Analizando tus respuestas para darte algo que realmente te cierre.</p>
        </div>`;
      getRecommendations();
    }

    async function getRecommendations() {
      try {
        const res = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(answers)
        });
        const data = await res.json();
        showResults(data.recommendations);
      } catch(e) {
        gc().innerHTML = `
          <div class="loading-box">
            <p style="font-size:1rem;color:#999;margin-bottom:1rem">No se pudo conectar con la IA. Intentá de nuevo.</p>
            <button class="btn btn-primary" id="retry-btn">Reintentar</button>
          </div>`;
        document.getElementById('retry-btn').addEventListener('click', showLoading);
      }
    }

    function showResults(recs) {
      let html = `
        <div style="text-align:center;max-width:560px;margin:0 auto 2rem;">
          <p class="hero-eyebrow">Listo</p>
          <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;margin-bottom:0.4rem">Tu noche está resuelta</h2>
          <p style="font-size:13px;color:#999">La IA analizó tus respuestas y te armó esta selección.</p>
        </div>`;
      recs.forEach((r, i) => {
        html += `
          <div class="result-card">
            <p class="result-num">Recomendación ${i+1}</p>
            <p class="result-title">${r.title}</p>
            <p class="result-meta">${r.year} · ${r.type} · ${r.platform}</p>
            <p class="result-desc">${r.why}</p>
          </div>`;
      });
      html += `<div class="restart-wrap"><button class="btn btn-primary" id="restart-btn">Volver a empezar</button></div>`;
      gc().innerHTML = html;
      document.getElementById('restart-btn').addEventListener('click', function() {
        current = 0; answers = {};
        document.getElementById('nav-btns').style.display = 'flex';
        renderQuestion();
      });
    }

    renderQuestion();
  </script>
</body>
</html>
